<?xml version="1.0" encoding="iso-8859-1"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 48 48" width="48" height="48" xml:space="preserve">
<!-- Fondo blanco con borde verde oscuro -->
<rect x="1" y="1" width="46" height="46" rx="3" ry="3" style="fill:#FFFFFF;stroke:#1B5E20;stroke-width:2;"/>

<!-- Palo de la bandera -->
<rect x="10" y="8" width="2" height="32" style="fill:#555555;"/>

<!-- Bandera a cuadros negra y blanca (6 cols x 4 filas) -->
<!-- Fila 1 -->
<rect x="12" y="8"  width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="18" y="8"  width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="24" y="8"  width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="30" y="8"  width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="36" y="8"  width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<!-- Fila 2 -->
<rect x="12" y="13" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="18" y="13" width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="24" y="13" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="30" y="13" width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="36" y="13" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<!-- Fila 3 -->
<rect x="12" y="18" width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="18" y="18" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="24" y="18" width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="30" y="18" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="36" y="18" width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<!-- Fila 4 -->
<rect x="12" y="23" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="18" y="23" width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="24" y="23" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>
<rect x="30" y="23" width="6" height="5" fill="#FFFFFF" stroke="#111111" stroke-width="0.5"/>
<rect x="36" y="23" width="6" height="5" fill="#111111" stroke="#111111" stroke-width="0.5"/>

<!-- Borde exterior de la bandera -->
<rect x="12" y="8" width="30" height="20" fill="none" stroke="#111111" stroke-width="1"/>
</svg>
